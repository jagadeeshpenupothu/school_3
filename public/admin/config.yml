backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow
local_backend: true

media_folder: public/assets/uploads
public_folder: /assets/uploads

site_url: https://dashing-starburst-19f83f.netlify.app
display_url: https://dashing-starburst-19f83f.netlify.app
logo_url: /favicon.svg

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

editor:
  preview: false

collections:
  - name: school_identity
    label: School Identity
    files:
      - name: site
        label: Identity, Contact, Utility Links
        file: src/data/site.json
        format: json
        fields:
          - { label: School Name, name: schoolName, widget: string }
          - { label: Tagline, name: tagline, widget: string }
          - { label: Location, name: location, widget: string }
          - { label: Board / Curriculum, name: board, widget: string }
          - { label: School Type, name: schoolType, widget: string }
          - { label: Affiliation Text, name: affiliationText, widget: text, required: false }
          - { label: Admission Status, name: admissionStatus, widget: string }
          - { label: Academic Year, name: academicYear, widget: string }
          - label: Logo
            name: logo
            widget: object
            fields:
              - { label: Text Mark, name: text, widget: string, required: false }
              - { label: Logo Image, name: image, widget: image, allow_multiple: false, required: false }
              - { label: Alt Text, name: alt, widget: string, required: false }
          - { label: Favicon, name: favicon, widget: image, allow_multiple: false, required: false }
          - { label: Social Image, name: socialImage, widget: image, allow_multiple: false, required: false }
          - { label: Email, name: email, widget: string }
          - { label: Admissions Email, name: admissionsEmail, widget: string, required: false }
          - { label: Phone, name: phone, widget: string }
          - { label: Admissions Phone, name: admissionsPhone, widget: string, required: false }
          - { label: Address, name: address, widget: text }
          - { label: Office Hours, name: hours, widget: string }
          - { label: School Timings, name: schoolTimings, widget: string }
          - { label: Map Embed URL, name: mapEmbed, widget: string, required: false }
          - { label: Directions URL, name: directionsUrl, widget: string, required: false }
          - label: Accessibility Labels
            name: labels
            widget: object
            fields:
              - { label: Skip Link, name: skipLink, widget: string }
              - { label: Toggle Navigation, name: toggleNavigation, widget: string }
              - { label: Main Navigation, name: mainNavigation, widget: string }
              - { label: School Statistics, name: schoolStatistics, widget: string }
          - label: Utility Links
            name: utilityLinks
            widget: list
            summary: "{{fields.label}}"
            fields: &link_fields
              - { label: Show, name: enabled, widget: boolean, default: true }
              - { label: Label, name: label, widget: string }
              - { label: Link, name: href, widget: string, required: false }
          - label: Quick Actions
            name: quickActions
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: Show, name: enabled, widget: boolean, default: true }
              - { label: Label, name: label, widget: string }
              - { label: Link, name: href, widget: string }
              - { label: Icon Text, name: icon, widget: string, required: false }
          - label: Social Links
            name: social
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: Show, name: enabled, widget: boolean, default: true }
              - { label: Label, name: label, widget: string }
              - { label: URL, name: url, widget: string, required: false }
              - { label: Icon, name: icon, widget: string, required: false }

  - name: navigation
    label: Navigation
    files:
      - name: navigation
        label: Primary Navigation
        file: src/data/navigation.json
        format: json
        fields:
          - label: Links
            name: items
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: Show Link, name: enabled, widget: boolean, default: true }
              - { label: Label, name: label, widget: string }
              - { label: Link, name: href, widget: string }
              - { label: Icon, name: icon, widget: string, required: false }

  - name: home
    label: Home Page
    files:
      - name: home
        label: Home Content
        file: src/data/home.json
        format: json
        fields:
          - label: Page Meta
            name: page
            widget: object
            fields: &page_fields
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Autoplay, name: autoplay, widget: boolean, default: true }
              - { label: Interval in ms, name: interval, widget: number, value_type: int, min: 3000, default: 5500 }
              - { label: Pause on Hover, name: pauseOnHover, widget: boolean, default: true }
              - { label: Show Arrows, name: showArrows, widget: boolean, default: true }
              - { label: Show Indicators, name: showIndicators, widget: boolean, default: true }
              - label: Slides
                name: slides
                widget: list
                summary: "{{fields.order}} - {{fields.title}}"
                fields:
                  - { label: Show Slide, name: enabled, widget: boolean, default: true }
                  - { label: Order, name: order, widget: number, value_type: int, required: false }
                  - { label: Desktop Image, name: image, widget: image, allow_multiple: false }
                  - { label: Mobile Image, name: mobileImage, widget: image, allow_multiple: false, required: false }
                  - { label: Image Alt Text, name: imageAlt, widget: string }
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
                  - { label: Primary CTA Label, name: primaryCtaLabel, widget: string, required: false }
                  - { label: Primary CTA URL, name: primaryCtaUrl, widget: string, required: false }
                  - { label: Secondary CTA Label, name: secondaryCtaLabel, widget: string, required: false }
                  - { label: Secondary CTA URL, name: secondaryCtaUrl, widget: string, required: false }
                  - { label: Text Alignment, name: textAlignment, widget: select, options: [left, center, right], default: left }
                  - { label: Overlay Strength, name: overlayStrength, widget: select, options: [medium, strong], default: medium }
                  - { label: Focal Position, name: focalPosition, widget: string, required: false, hint: "Example: center center, 40% center" }
              - { label: Statistics Label, name: statisticsLabel, widget: string, required: false }
              - { label: Highlights Label, name: highlightsLabel, widget: string, required: false }
              - label: Highlights
                name: highlights
                widget: list
                summary: "{{fields.title}}"
                fields: &image_card_fields
                  - { label: Show, name: enabled, widget: boolean, default: true }
                  - { label: Order, name: order, widget: number, value_type: int, required: false }
                  - { label: Title, name: title, widget: string }
                  - { label: Label / Category, name: label, widget: string, required: false }
                  - { label: Image, name: image, widget: image, allow_multiple: false, required: false }
                  - { label: Alt Text, name: alt, widget: string, required: false }
          - label: About Section
            name: about
            widget: object
            fields: &image_text_section_fields
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text }
              - label: Image
                name: image
                widget: object
                required: false
                fields:
                  - { label: Image, name: src, widget: image, allow_multiple: false, required: false }
                  - { label: Alt Text, name: alt, widget: string, required: false }
              - label: Buttons
                name: buttons
                widget: list
                required: false
                fields: &button_fields
                  - { label: Show, name: enabled, widget: boolean, default: true }
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
                  - { label: Style, name: style, widget: select, options: [primary, light] }
          - label: Section Intros
            name: sectionIntrosNote
            widget: markdown
            required: false
            hint: "Edit the objects below for homepage section titles and visibility."
          - label: Leadership Intro
            name: leadership
            widget: object
            fields: &intro_fields
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text, required: false }
          - { label: Statistics, name: statistics, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: Courses Intro, name: courses, widget: object, fields: *intro_fields }
          - { label: Features Intro, name: features, widget: object, fields: *intro_fields }
          - { label: Admissions Intro, name: admissions, widget: object, fields: *intro_fields }
          - { label: Facilities Intro, name: facilities, widget: object, fields: *intro_fields }
          - { label: Student Life Intro, name: studentLife, widget: object, fields: *intro_fields }
          - { label: Achievements Intro, name: achievements, widget: object, fields: *intro_fields }
          - { label: Events Intro, name: events, widget: object, fields: *intro_fields }
          - { label: Gallery Intro, name: gallery, widget: object, fields: *intro_fields }
          - { label: Testimonials Intro, name: testimonials, widget: object, fields: *intro_fields }
          - label: CTA
            name: cta
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text }
              - label: Buttons
                name: buttons
                widget: list
                fields: *button_fields

  - name: pages
    label: Subpage Content
    files:
      - name: about
        label: About Page
        file: src/data/about.json
        format: json
        fields:
          - { label: Page Meta, name: page, widget: object, fields: *page_fields }
          - { label: Hero, name: hero, widget: object, fields: *intro_fields }
          - label: Story
            name: story
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - label: Image
                name: image
                widget: object
                fields:
                  - { label: Image, name: src, widget: image, allow_multiple: false }
                  - { label: Alt Text, name: alt, widget: string }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text }
              - { label: Body, name: body, widget: text, required: false }
          - { label: Vision, name: vision, widget: object, fields: [{ label: Show, name: enabled, widget: boolean, default: true }, { label: Title, name: title, widget: string }, { label: Text, name: text, widget: text }] }
          - { label: Mission, name: mission, widget: object, fields: [{ label: Show, name: enabled, widget: boolean, default: true }, { label: Title, name: title, widget: string }, { label: Items, name: items, widget: list, field: { label: Item, name: item, widget: string } }] }
          - { label: Values, name: values, widget: object, fields: [{ label: Show, name: enabled, widget: boolean, default: true }, { label: Items, name: items, widget: list, field: { label: Value, name: value, widget: string } }] }
          - { label: Statistics, name: statistics, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: Features, name: features, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
          - { label: CTA, name: cta, widget: object, fields: [{ label: Show Section, name: enabled, widget: boolean, default: true }] }
      - name: contact
        label: Contact Page
        file: src/data/contact.json
        format: json
        fields:
          - { label: Page Meta, name: page, widget: object, fields: *page_fields }
          - { label: Hero, name: hero, widget: object, fields: *intro_fields }
          - label: Contact Display
            name: contact
            widget: object
            fields:
              - { label: Show Section, name: enabled, widget: boolean, default: true }
              - { label: Office Title, name: officeTitle, widget: string }
              - { label: Show Address, name: showAddress, widget: boolean, default: true }
              - { label: Show Email, name: showEmail, widget: boolean, default: true }
              - { label: Show Phone, name: showPhone, widget: boolean, default: true }
              - { label: Show Hours, name: showHours, widget: boolean, default: true }
          - label: Form
            name: form
            widget: object
            fields:
              - { label: Show Form, name: enabled, widget: boolean, default: true }
              - { label: Action URL, name: action, widget: string }
              - { label: Method, name: method, widget: select, options: [post, get] }
              - { label: Submit Label, name: submitLabel, widget: string }
              - label: Fields
                name: fields
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: Show Field, name: enabled, widget: boolean, default: true }
                  - { label: Label, name: label, widget: string }
                  - { label: Name, name: name, widget: string }
                  - { label: Type, name: type, widget: select, options: [text, email, tel, select, textarea, checkbox] }
                  - { label: Autocomplete, name: autocomplete, widget: string, required: false }
                  - { label: Required, name: required, widget: boolean, default: false }
                  - { label: Rows, name: rows, widget: number, value_type: int, required: false }
                  - { label: Options, name: options, widget: list, required: false, field: { label: Option, name: option, widget: string } }
      - name: route_pages
        label: Academics, Events, Gallery, Faculty Pages
        file: src/data/pages.json
        format: json
        fields:
          - { label: Academics Page, name: courses, widget: object, fields: [{ label: Page Meta, name: page, widget: object, fields: *page_fields }, { label: Hero, name: hero, widget: object, fields: *intro_fields }, { label: Courses Intro, name: courses, widget: object, fields: *intro_fields }, { label: CTA, name: cta, widget: object, fields: [{ label: Show, name: enabled, widget: boolean, default: true }] }] }
          - { label: Events Page, name: events, widget: object, fields: [{ label: Page Meta, name: page, widget: object, fields: *page_fields }, { label: Hero, name: hero, widget: object, fields: *intro_fields }, { label: Events Intro, name: events, widget: object, fields: *intro_fields }, { label: CTA, name: cta, widget: object, fields: [{ label: Show, name: enabled, widget: boolean, default: true }] }] }
          - { label: Gallery Page, name: gallery, widget: object, fields: [{ label: Page Meta, name: page, widget: object, fields: *page_fields }, { label: Hero, name: hero, widget: object, fields: *intro_fields }, { label: Gallery Intro, name: gallery, widget: object, fields: *intro_fields }, { label: CTA, name: cta, widget: object, fields: [{ label: Show, name: enabled, widget: boolean, default: true }] }] }
          - { label: Faculty Page, name: teachers, widget: object, fields: [{ label: Page Meta, name: page, widget: object, fields: *page_fields }, { label: Hero, name: hero, widget: object, fields: *intro_fields }, { label: Staff Intro, name: staff, widget: object, fields: *intro_fields }, { label: CTA, name: cta, widget: object, fields: [{ label: Show, name: enabled, widget: boolean, default: true }] }] }

  - name: academics
    label: Academics
    files:
      - name: courses
        label: Academic Programmes
        file: src/data/courses.json
        format: json
        fields:
          - { label: Show Academics, name: enabled, widget: boolean, default: true }
          - label: Programmes
            name: items
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Show, name: enabled, widget: boolean, default: true }
              - { label: Title, name: title, widget: string }
              - { label: Level, name: level, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Image, name: image, widget: image, allow_multiple: false, required: false }
              - { label: Alt Text, name: alt, widget: string, required: false }
      - name: admissions
        label: Admissions
        file: src/data/admissions.json
        format: json
        fields:
          - { label: Show Admissions, name: enabled, widget: boolean, default: true }
          - { label: Academic Year, name: academicYear, widget: string }
          - { label: Status, name: status, widget: string }
          - { label: Classes Open, name: classesOpen, widget: string }
          - { label: Summary, name: summary, widget: text }
          - { label: Eligibility, name: eligibility, widget: list, field: { label: Item, name: item, widget: string } }
          - label: Process
            name: process
            widget: list
            summary: "{{fields.step}} {{fields.title}}"
            fields: &process_fields
              - { label: Show, name: enabled, widget: boolean, default: true }
              - { label: Step, name: step, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Text, name: text, widget: text }
          - { label: Required Documents, name: documents, widget: list, field: { label: Document, name: document, widget: string } }
          - { label: Contact Links, name: contacts, widget: list, fields: [{ label: Show, name: enabled, widget: boolean, default: true }, { label: Label, name: label, widget: string }, { label: Value, name: value, widget: string }, { label: Link, name: href, widget: string, required: false }] }
          - { label: Action Links, name: links, widget: list, fields: *link_fields }

  - name: notices_documents
    label: Notices, Circulars & Downloads
    files:
      - name: notices
        label: Notices and Circulars
        file: src/data/notices.json
        format: json
        fields: &notice_file_fields
          - { label: Show Section, name: enabled, widget: boolean, default: true }
          - label: Items
            name: items
            widget: list
            summary: "{{fields.title}}"
            fields: &notice_fields
              - { label: Show, name: enabled, widget: boolean, default: true }
              - { label: Order, name: order, widget: number, value_type: int, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Description / Text, name: text, widget: text, required: false }
              - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
              - { label: Expiry Date, name: expiryDate, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false, required: false }
              - { label: Category, name: category, widget: string, required: false }
              - { label: Important, name: important, widget: boolean, default: false }
              - { label: New, name: new, widget: boolean, default: false }
              - { label: PDF / Document, name: file, widget: file, required: false }
              - { label: External Link, name: externalLink, widget: string, required: false }
      - name: downloads
        label: Downloads
        file: src/data/downloads.json
        format: json
        fields:
          - { label: Show Downloads, name: enabled, widget: boolean, default: true }
          - label: Items
            name: items
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Show, name: enabled, widget: boolean, default: true }
              - { label: Order, name: order, widget: number, value_type: int, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text, required: false }
              - { label: Category, name: category, widget: string, required: false }
              - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
              - { label: Expiry Date, name: expiryDate, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false, required: false }
              - { label: PDF / Document, name: file, widget: file, required: false }
              - { label: External Link, name: externalLink, widget: string, required: false }
              - { label: Important, name: important, widget: boolean, default: false }

  - name: people
    label: Leadership & Faculty
    files:
      - name: staff
        label: Leadership and Faculty
        file: src/data/staff.json
        format: json
        fields:
          - { label: Show Staff, name: enabled, widget: boolean, default: true }
          - label: Faculty Members
            name: items
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: Show, name: enabled, widget: boolean, default: true }
              - { label: Name, name: name, widget: string }
              - { label: Role, name: role, widget: string }
              - { label: Department, name: department, widget: string, required: false }
              - { label: Qualification, name: qualification, widget: string, required: false }
              - { label: Experience, name: experience, widget: string, required: false }
              - { label: Bio, name: bio, widget: text }
              - { label: Image, name: image, widget: image, allow_multiple: false, required: false }
              - { label: Alt Text, name: alt, widget: string, required: false }
          - label: Leadership Messages
            name: leadership
            widget: list
            summary: "{{fields.role}} - {{fields.name}}"
            fields:
              - { label: Show, name: enabled, widget: boolean, default: true }
              - { label: Role, name: role, widget: string }
              - { label: Name, name: name, widget: string }
              - { label: Photograph, name: photograph, widget: image, allow_multiple: false, required: false }
              - { label: Alt Text, name: alt, widget: string, required: false }
              - { label: Short Message, name: shortMessage, widget: text }
              - { label: Full Message, name: fullMessage, widget: text, required: false }
              - { label: Signature, name: signature, widget: string, required: false }
              - { label: Order, name: order, widget: number, value_type: int, required: false }

  - name: campus_life
    label: Campus Life
    files:
      - { name: facilities, label: Facilities, file: src/data/facilities.json, format: json, fields: &media_collection_fields [{ label: Show Section, name: enabled, widget: boolean, default: true }, { label: Items, name: items, widget: list, summary: "{{fields.title}}", fields: [{ label: Show, name: enabled, widget: boolean, default: true }, { label: Order, name: order, widget: number, value_type: int, required: false }, { label: Title, name: title, widget: string }, { label: Category, name: category, widget: string, required: false }, { label: Description, name: description, widget: text }, { label: Image, name: image, widget: image, allow_multiple: false, required: false }, { label: Alt Text, name: alt, widget: string, required: false }, { label: Gallery, name: gallery, widget: list, required: false, fields: [{ label: Image, name: src, widget: image }, { label: Alt Text, name: alt, widget: string, required: false }, { label: Caption, name: caption, widget: string, required: false }] }, { label: Uploaded Video, name: video, widget: file, required: false }, { label: Video Poster, name: videoPoster, widget: image, required: false }, { label: YouTube URL, name: youtubeUrl, widget: string, required: false }] }] }
      - { name: student_life, label: Student Life, file: src/data/student-life.json, format: json, fields: *media_collection_fields }
      - name: achievements
        label: Achievements and Results
        file: src/data/achievements.json
        format: json
        fields:
          - { label: Show Section, name: enabled, widget: boolean, default: true }
          - label: Items
            name: items
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Show, name: enabled, widget: boolean, default: true }
              - { label: Order, name: order, widget: number, value_type: int, required: false }
              - { label: Featured, name: featured, widget: boolean, default: false }
              - { label: Category, name: category, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Student / Recipient, name: recipient, widget: string, required: false }
              - { label: Class, name: class, widget: string, required: false }
              - { label: Year, name: year, widget: string, required: false }
              - { label: Result / Score, name: result, widget: string, required: false }
              - { label: Description, name: description, widget: text }
              - { label: Image, name: image, widget: image, allow_multiple: false, required: false }
              - { label: Alt Text, name: alt, widget: string, required: false }
              - { label: Gallery, name: gallery, widget: list, required: false, fields: [{ label: Image, name: src, widget: image }, { label: Alt Text, name: alt, widget: string, required: false }] }
              - { label: Uploaded Video, name: video, widget: file, required: false }
              - { label: YouTube URL, name: youtubeUrl, widget: string, required: false }
              - { label: Certificate / Document, name: certificate, widget: file, required: false }

  - name: news_events_gallery
    label: News, Events & Gallery
    files:
      - name: news
        label: Latest News
        file: src/data/news.json
        format: json
        fields:
          - { label: Show News, name: enabled, widget: boolean, default: true }
          - label: News Items
            name: items
            widget: list
            summary: "{{fields.title}}"
            fields: &news_fields
              - { label: Show, name: enabled, widget: boolean, default: true }
              - { label: Order, name: order, widget: number, value_type: int, required: false }
              - { label: Featured, name: featured, widget: boolean, default: false }
              - { label: Title, name: title, widget: string }
              - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
              - { label: Summary, name: summary, widget: text }
              - { label: Content, name: content, widget: text, required: false }
              - { label: Image, name: image, widget: image, allow_multiple: false, required: false }
              - { label: Image Alt, name: imageAlt, widget: string, required: false }
